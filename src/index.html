<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=verified" />
    <link rel="stylesheet" href="/sign-up-form/src/style.css">
    <title>sign-up</title>
</head>
<body>

    <div class="main">
        <div class="container">
            <div class="main-form-area">

                <div id="top-icon">
                    <span class="material-symbols-outlined" style="color: #ffffff; font-size: 36px;">verified</span>
                </div>

                <div id="heading">Create your account</div>
                <div id="sub-heading">Join our community and start your journey today.</div>

                <div class="form-fiels">
                    <div id="name">Full Name</div>
                    <input type="text" name="name-field" id="name-field" placeholder="Enter your full name">
                    <div id="email">Email Address</div>
                    <input type="email" name="email-field" id="email-field" placeholder="name@example.com">
                    <div id="password">Password</div>
                    <input type="password" name="password-field" id="password-field" placeholder="Create a strong password"><br>
                    <input type="checkbox" name="t&a" id="t&a">I agree to the Terms of Service and Privacy Policy.
                </div>

                <div class="sign-up">
                    <div id="sign-up-button">Sign Up</div>
                    <div id="sign-in">Already have an account? Sign in here</div>
                </div>

            </div>

        </div>
    </div>
    
</body>
</html>
